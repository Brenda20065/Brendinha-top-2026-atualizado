<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <header>
        <div>"logo" projeto</div>
        <nav>
            <ul>
                <li>Home</li>
                <li>Produtos</li>
                <li>Contato</li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="the-circle">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>

        <div class="list">
            <div class="item active"></div>

            <div class="item">
                <div class="product-img">
                    <img src="./img/toma.png">
                </div>
                <div class="content">
                    <p class="product-tag">lançamento</p>
                    <p class="product-name">Jack original</p>
                    <p class="product-description">
                        O Jack Daniel's é classificado como um Tennessee Whiskey. Isso significa que ele atende a todos
                        os requisitos legais para ser um Bourbon
                    </p>
                    <button class="btn">Comprar</button>
                </div>

            </div>

            <div class="item">
                <div class="product-img">
                    <img src="./img/fumo.png">
                </div>
                <div class="content">
                    <p class="product-tag">lançamento</p>
                    <p class="product-name">da boa</p>
                    <p class="product-description">
                        verddinho do bom 10gm
                    </p>
                    <button class="btn">Comprar</button>
                </div>
            </div>



            <div class="arrows">  
                <button class="arrow-btn" id="prev">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-caret-left-fill" viewBox="0 0 16 16">
                        <path d="m3.86 8.753 5.482 4.796c.646.566 1.658.106 1.658-.753V3.204a1 1 0 0 0-1.659-.753l-5.48 4.796a1 1 0 0 0 0 1.506z"/>
                     </svg>"
                </button>
                <button> 
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-caret-right-fill" viewBox="0 0 16 16">
                        <path d="m12.14 8.753-5.482 4.796c-.646.566-1.658.106-1.658-.753V3.204a1 1 0 0 1 1.659-.753l5.48 4.796a1 1 0 0 1 0 1.506z"/>
                    </svg>
              </button>
            </div>
            
            <div class="indicators">
                <div class="numbers">1</div>
                <div class="dot active"></div>
                <div class="dot"></div>
            </div>
    </main>
</body>

</html>
